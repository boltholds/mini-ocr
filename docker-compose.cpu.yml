name: mini-ocr-cpu

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: mini-ocr:cpu
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ocr_db}
      STORAGE_DIR: /data/storage

      OCR_USE_GPU: "false"
      OCR_LANG: ${OCR_LANG:-ru}
      ENABLE_IMAGE_PREPROCESSING: ${ENABLE_IMAGE_PREPROCESSING:-false}
      ENABLE_AUTO_ROTATION: ${ENABLE_AUTO_ROTATION:-true}

      ENABLE_LLM: ${ENABLE_LLM:-true}
      ENABLE_REGEX_FALLBACK: ${ENABLE_REGEX_FALLBACK:-false}
      ENABLE_LANGGRAPH_WORKFLOW: ${ENABLE_LANGGRAPH_WORKFLOW:-true}
      ENABLE_AGENT_VALIDATION: ${ENABLE_AGENT_VALIDATION:-true}
      ENABLE_OCR_CORRECTION_AGENT: ${ENABLE_OCR_CORRECTION_AGENT:-true}
      ENABLE_RAG_VALIDATION: ${ENABLE_RAG_VALIDATION:-true}
      RAG_TOP_K: ${RAG_TOP_K:-5}

      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b-instruct}
      PROMPT_VERSION: ${PROMPT_VERSION:-terms_abbrev_extractor_v9_clean_architecture}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      VALIDATION_AUTO_THRESHOLD: ${VALIDATION_AUTO_THRESHOLD:-0.75}
      CORRECTION_AUTO_THRESHOLD: ${CORRECTION_AUTO_THRESHOLD:-0.70}

      ENABLE_AGENT_TRACING: ${ENABLE_AGENT_TRACING:-true}
      AGENT_LOG_LEVEL: ${AGENT_LOG_LEVEL:-INFO}
      AGENT_LOG_FILE: ${AGENT_LOG_FILE:-/data/logs/agents.log}
    volumes:
      - mini_ocr_storage:/data/storage
      - mini_ocr_logs:/data/logs
      - paddle_cache:/root/.paddlex
    ports:
      - "${APP_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    mem_limit: ${APP_MEMORY_LIMIT:-12g}
    shm_size: ${APP_SHM_SIZE:-2g}
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ocr_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-512MB}"
      - "-c"
      - "work_mem=${POSTGRES_WORK_MEM:-16MB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-1536MB}"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-50}"
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-2g}
    shm_size: ${POSTGRES_SHM_SIZE:-512m}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ocr_db}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

volumes:
  pgdata:
  mini_ocr_storage:
  mini_ocr_logs:
  paddle_cache:
