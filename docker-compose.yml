services:
  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ocr_db
      STORAGE_DIR: /data/storage
      OCR_USE_GPU: "false"
      OCR_LANG: ru
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      ENABLE_LLM: ${ENABLE_LLM:-true}
      ENABLE_LLM_VALIDATION: ${ENABLE_LLM_VALIDATION:-false}
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ocr_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ocr_db"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
